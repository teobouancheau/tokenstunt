name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    if: github.actor == 'teobouancheau'
    outputs:
      version: ${{ steps.calc.outputs.version }}
      tag: ${{ steps.calc.outputs.tag }}
      name: ${{ steps.calc.outputs.name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate version
        id: calc
        run: |
          DATE=$(date -u +%Y.%-m.%-d)
          EXISTING=$(git tag -l "v${DATE}.*" | sort -V | tail -1)
          if [[ -z "$EXISTING" ]]; then
            PATCH=0
          else
            LAST_PATCH=$(echo "$EXISTING" | sed "s/v${DATE}\.//")
            PATCH=$((LAST_PATCH + 1))
          fi
          VERSION="${DATE}.${PATCH}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release: $VERSION"

  build:
    needs: version
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev:arm64 pkg-config
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Add arm64 architecture
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list.d/*.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs) main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ $(lsb_release -cs)-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y libssl-dev:arm64

      - name: Set version in Cargo.toml
        run: |
          sed -i.bak 's/^version = ".*"/version = "${{ needs.version.outputs.version }}"/' Cargo.toml
          rm -f Cargo.toml.bak

      - name: Test
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_SYSROOT_DIR: /usr/aarch64-linux-gnu
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          OPENSSL_DIR: /usr/aarch64-linux-gnu

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../tokenstunt-${{ matrix.target }}.tar.gz tokenstunt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tokenstunt-${{ matrix.target }}
          path: tokenstunt-${{ matrix.target }}.tar.gz

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set version and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sed -i.bak 's/^version = ".*"/version = "${{ needs.version.outputs.version }}"/' Cargo.toml
          rm -f Cargo.toml.bak
          git add Cargo.toml
          git commit -m "chore: bump version to ${{ needs.version.outputs.version }}"
          git tag "${{ needs.version.outputs.tag }}"
          git push origin main --tags

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.name }}
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
